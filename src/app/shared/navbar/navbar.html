<nav class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" class="logo">
      <img src="codehub-logo.png" alt="CodeHub" class="logo-img" />
    </a>

    @if (auth.isLoggedIn() && !forcePublic) {
      <div class="nav-center">
        <a routerLink="/dashboard" routerLinkActive="active">Learn</a>
        <a routerLink="/courses" routerLinkActive="active">Courses</a>
        <a routerLink="/leaderboard" routerLinkActive="active">Leaderboard</a>
      </div>
      <div class="nav-right">
        <div class="stat-pill">
          <span class="fire">🔥</span>
          <span class="stat-val">{{ user?.streak || 0 }}</span>
        </div>
        <div class="stat-pill">
          <span class="bolt">⚡</span>
          <span class="stat-val">{{ user?.xp || 0 }}</span>
        </div>
        <div class="hearts-row">
          @for (full of heartsArray; track $index) {
            <span class="heart" [class.empty]="!full">❤️</span>
          }
        </div>
        <a routerLink="/profile" class="avatar">
          @if (user?.avatar && !avatarError) {
            <img [src]="'/assets/' + user.avatar" class="avatar-img" alt="" (error)="onAvatarError()" />
          } @else {
            {{ user?.name?.[0]?.toUpperCase() || '?' }}
          }
        </a>
        <button class="btn-logout" (click)="logout()">Logout</button>
      </div>
    } @else {
      <div class="nav-right">
        <a routerLink="/login" class="btn-nav-ghost">Login</a>
        <a routerLink="/register" class="btn-duo btn-duo-primary btn-nav-cta">Get Started</a>
      </div>
    }
  </div>
</nav>
