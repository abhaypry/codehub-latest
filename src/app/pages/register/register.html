<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="green">{{ '{' }}</span>CodeHub<span class="green">{{ '}' }}</span>
    </div>
    <h2>Create your account</h2>
    <p class="auth-sub">Join for free and start learning today</p>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="submit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" [(ngModel)]="name" name="name" placeholder="Your name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="Min. 6 characters" />
      </div>
      <button type="submit" class="btn-duo btn-duo-primary btn-full" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
